name: CD — Build, Push & Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/freelancer-platform

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build & push Docker images to GHCR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      web_image: ${{ env.IMAGE_PREFIX }}/web:${{ steps.meta.outputs.version }}
      backend_image: ${{ env.IMAGE_PREFIX }}/backend:${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver-opts: image=moby/buildkit:buildx-stable-1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}/web
            ${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Freelancer Platform
            org.opencontainers.image.description=Freelancer Platform Monorepo
            org.opencontainers.image.vendor=FreelancerPlatform
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/web:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/web:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NODE_ENV=production
          platforms: linux/amd64,linux/arm64

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/backend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            NODE_ENV=production
          platforms: linux/amd64,linux/arm64

      - name: Generate deployment summary
        run: |
          echo "## 🐳 Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| \`web\` | \`${{ steps.meta.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`backend\` | \`${{ steps.meta.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy to Staging (every push to main)
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.freelancerplatform.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.STAGING_KEY }}
          known_hosts: ${{ secrets.STAGING_KNOWN_HOSTS }}
          if_key_exists: replace

      - name: Copy compose file to staging server
        run: |
          scp -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/freelancer-platform/docker-compose.yml

      - name: Deploy to staging via SSH
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web_image }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'ENDSSH'

            set -euo pipefail
            cd /opt/freelancer-platform

            echo "==> Logging in to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            echo "==> Writing .env file..."
            cat > .env << 'EOF'
            NODE_ENV=staging
            WEB_IMAGE=${{ env.WEB_IMAGE }}
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}
            DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}
            REDIS_URL=${{ secrets.STAGING_REDIS_URL }}
            ELASTICSEARCH_URL=${{ secrets.STAGING_ELASTICSEARCH_URL }}
            KAFKA_BROKERS=${{ secrets.STAGING_KAFKA_BROKERS }}
            JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.STAGING_JWT_REFRESH_SECRET }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_S3_BUCKET=${{ secrets.STAGING_S3_BUCKET }}
            STRIPE_SECRET_KEY=${{ secrets.STAGING_STRIPE_SECRET_KEY }}
            SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}
            EOF

            echo "==> Pulling latest images..."
            docker compose pull web backend

            echo "==> Running database migrations..."
            docker compose run --rm backend pnpm db:migrate

            echo "==> Bringing services up..."
            docker compose up -d --remove-orphans

            echo "==> Pruning dangling images..."
            docker image prune -f

            echo "==> Staging deployment complete!"
            docker compose ps

          ENDSSH

      - name: Verify staging deployment
        run: |
          echo "Waiting for staging to become healthy..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://staging.freelancerplatform.com/api/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Staging health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "✅ Staging health check passed (HTTP $STATUS)"

      - name: Annotate deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'staging',
              description: 'Deployed to staging via CD pipeline',
              auto_merge: false,
              required_contexts: [],
              production_environment: false,
            });

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy to Production (semver tags only)
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://freelancerplatform.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.PROD_KEY }}
          known_hosts: ${{ secrets.PROD_KNOWN_HOSTS }}
          if_key_exists: replace

      - name: Copy compose file to production server
        run: |
          scp -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/opt/freelancer-platform/docker-compose.yml

      - name: Deploy to production via SSH
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web_image }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'ENDSSH'

            set -euo pipefail
            cd /opt/freelancer-platform

            echo "==> Logging in to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            echo "==> Backing up current .env..."
            cp .env .env.backup.$(date +%Y%m%d%H%M%S) || true

            echo "==> Writing .env file..."
            cat > .env << 'EOF'
            NODE_ENV=production
            RELEASE_TAG=${{ env.RELEASE_TAG }}
            WEB_IMAGE=${{ env.WEB_IMAGE }}
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}
            DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}
            REDIS_URL=${{ secrets.PROD_REDIS_URL }}
            ELASTICSEARCH_URL=${{ secrets.PROD_ELASTICSEARCH_URL }}
            KAFKA_BROKERS=${{ secrets.PROD_KAFKA_BROKERS }}
            JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.PROD_JWT_REFRESH_SECRET }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_S3_BUCKET=${{ secrets.PROD_S3_BUCKET }}
            STRIPE_SECRET_KEY=${{ secrets.PROD_STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.PROD_STRIPE_WEBHOOK_SECRET }}
            SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GITHUB_CLIENT_ID=${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
            FCM_SERVER_KEY=${{ secrets.FCM_SERVER_KEY }}
            PLATFORM_FEE_PERCENTAGE=10
            EOF

            echo "==> Pulling latest images..."
            docker compose pull web backend

            echo "==> Running database migrations (with backup safety)..."
            docker compose run --rm backend pnpm db:migrate

            echo "==> Rolling update — scaling web to 2 replicas..."
            docker compose up -d --scale web=2 --no-recreate

            echo "==> Waiting for new containers to stabilize (30s)..."
            sleep 30

            echo "==> Cutting over — removing old containers..."
            docker compose up -d --remove-orphans

            echo "==> Pruning dangling images..."
            docker image prune -f

            echo "==> Production deployment complete!"
            docker compose ps

          ENDSSH

      - name: Verify production deployment
        run: |
          echo "Waiting for production to become healthy..."
          sleep 20
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://freelancerplatform.com/api/health || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Production health check failed after 3 attempts"
          exit 1

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: `## 🚀 Production Release ${tag}\n\n` +
                    `**Deployed at:** ${new Date().toISOString()}\n` +
                    `**Commit:** ${context.sha.substring(0, 7)}\n\n` +
                    `### Docker Images\n` +
                    `- \`${{ needs.build-and-push.outputs.web_image }}\`\n` +
                    `- \`${{ needs.build-and-push.outputs.backend_image }}\`\n`,
              draft: false,
              prerelease: tag.includes('-rc') || tag.includes('-beta') || tag.includes('-alpha'),
            });
            console.log(`Release created: ${release.html_url}`);

      - name: Annotate production deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: `Production release ${{ github.ref_name }}`,
              auto_merge: false,
              required_contexts: [],
              production_environment: true,
            });

  # ─────────────────────────────────────────────
  # JOB 4 — Slack Notifications
  # ─────────────────────────────────────────────
  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Determine overall status
        id: status
        run: |
          BUILD_RESULT="${{ needs.build-and-push.result }}"
          STAGING_RESULT="${{ needs.deploy-staging.result }}"
          PROD_RESULT="${{ needs.deploy-production.result }}"

          if [ "$BUILD_RESULT" = "failure" ] || \
             [ "$STAGING_RESULT" = "failure" ] || \
             [ "$PROD_RESULT" = "failure" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "color=#FF0000" >> $GITHUB_OUTPUT
          elif [ "$BUILD_RESULT" = "cancelled" ] || \
               [ "$STAGING_RESULT" = "cancelled" ] || \
               [ "$PROD_RESULT" = "cancelled" ]; then
            echo "status=cancelled" >> $GITHUB_OUTPUT
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
            echo "color=#FFA500" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "color=#00CC44" >> $GITHUB_OUTPUT
          fi

          # Determine environment label
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "environment=🏭 Production (${{ github.ref_name }})" >> $GITHUB_OUTPUT
          else
            echo "environment=🧪 Staging (main)" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "${{ steps.status.outputs.emoji }} Freelancer Platform — Deploy ${{ steps.status.outputs.status }}",
                        "emoji": true
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*Environment:*\n${{ steps.status.outputs.environment }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Triggered by:*\n${{ github.actor }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Branch/Tag:*\n`${{ github.ref_name }}`"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Build:*\n${{ needs.build-and-push.result == 'success' && '✅ Passed' || '❌ Failed' }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*Staging Deploy:*\n${{ needs.deploy-staging.result == 'success' && '✅ Deployed' || needs.deploy-staging.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }}"
                        }
                      ]
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": {
                            "type": "plain_text",
                            "text": "View Workflow Run"
                          },
                          "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                        },
                        {
                          "type": "button",
                          "text": {
                            "type": "plain_text",
                            "text": "View Repository"
                          },
                          "url": "${{ github.server_url }}/${{ github.repository }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
